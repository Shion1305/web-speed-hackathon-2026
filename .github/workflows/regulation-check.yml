name: Regulation Check

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]

jobs:
    regulation:
        name: VRT & E2E (Baseline vs Current)
        if: github.repository != 'CyberAgentHack/web-speed-hackathon-2026'
        runs-on: ubuntu-24.04
        timeout-minutes: 90

        steps:
            - name: Checkout repository
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
              with:
                  fetch-depth: 0

            - name: Add parent repository as upstream remote
              run: |
                  git remote add upstream https://github.com/CyberAgentHack/web-speed-hackathon-2026.git || true
                  git fetch upstream main

            - name: Set up Node.js 24.14.0
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: "24.14.0"

            - name: Set up pnpm 10.32.1
              uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
              with:
                  version: "10.32.1"

            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache pnpm store
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
              with:
                  path: ${{ steps.pnpm-cache.outputs.store }}
                  key: pnpm-store-${{ runner.os }}-${{ hashFiles('application/pnpm-lock.yaml') }}
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-

            - name: Install application dependencies
              working-directory: application
              run: pnpm install --frozen-lockfile

            - name: Install Chrome and Playwright system dependencies
              working-directory: application/e2e
              run: pnpm exec playwright install chrome --with-deps

            - name: Detect initial commit hash
              run: |
                  INITIAL_SHA="$(git rev-list --max-parents=0 --reverse upstream/main | head -n 1)"
                  if [ -z "${INITIAL_SHA}" ]; then
                    echo "ERROR: Failed to resolve initial commit hash from upstream/main"
                    exit 1
                  fi
                  echo "Resolved initial commit from upstream/main: ${INITIAL_SHA}"
                  echo "Current commit: ${GITHUB_SHA}"
                  echo "INITIAL_SHA=${INITIAL_SHA}" >> "${GITHUB_ENV}"
                  echo "INIT_SNAPSHOTS_ARTIFACT=regulation-init-snapshots-${INITIAL_SHA}" >> "${GITHUB_ENV}"

            - name: Remove checked-in snapshots before baseline restore
              run: find application/e2e/src -maxdepth 1 -type d -name "*.test.ts-snapshots" -exec rm -rf {} +

            - name: Find init snapshots artifact
              id: find-init-snapshots
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ARTIFACT_ID=""
                  for PAGE in $(seq 1 20); do
                    ARTIFACT_ID="$(curl -fsSL \
                      -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100&page=${PAGE}" \
                      | jq -r --arg name "${INIT_SNAPSHOTS_ARTIFACT}" '.artifacts[] | select(.name == $name and .expired == false) | .id' \
                      | head -n 1)"
                    if [ -n "${ARTIFACT_ID}" ]; then
                      break
                    fi
                  done
                  if [ -n "${ARTIFACT_ID}" ]; then
                    echo "Found init snapshots artifact: ${INIT_SNAPSHOTS_ARTIFACT} (id=${ARTIFACT_ID})"
                    echo "found=true" >> "${GITHUB_OUTPUT}"
                    echo "artifact_id=${ARTIFACT_ID}" >> "${GITHUB_OUTPUT}"
                  else
                    echo "Init snapshots artifact not found: ${INIT_SNAPSHOTS_ARTIFACT}"
                    echo "found=false" >> "${GITHUB_OUTPUT}"
                  fi

            - name: Download init snapshots artifact
              if: steps.find-init-snapshots.outputs.found == 'true'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  curl -fsSL \
                    -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${{ steps.find-init-snapshots.outputs.artifact_id }}/zip" \
                    -o /tmp/init-snapshots.zip
                  unzip -o /tmp/init-snapshots.zip -d "${GITHUB_WORKSPACE}"

            - name: Detect whether baseline snapshots are ready
              id: baseline-snapshots
              run: |
                  if find application/e2e/src -maxdepth 1 -type d -name "*.test.ts-snapshots" | grep -q .; then
                    echo "Baseline snapshots found"
                    echo "ready=true" >> "${GITHUB_OUTPUT}"
                  else
                    echo "Baseline snapshots not found"
                    echo "ready=false" >> "${GITHUB_OUTPUT}"
                  fi

            - name: Checkout initial commit to worktree
              if: steps.baseline-snapshots.outputs.ready != 'true'
              run: git worktree add /tmp/wsh-initial "$INITIAL_SHA"

            - name: Build and run initial baseline app
              if: steps.baseline-snapshots.outputs.ready != 'true'
              run: |
                  docker build -t wsh-baseline-initial /tmp/wsh-initial
                  docker run -d --name wsh-baseline-initial -e PORT=8080 -p 18080:8080 wsh-baseline-initial

            - name: Wait for initial baseline app
              if: steps.baseline-snapshots.outputs.ready != 'true'
              run: |
                  echo "Waiting for baseline app on http://localhost:18080 ..."
                  for i in $(seq 1 45); do
                    if curl --silent --fail --max-time 3 http://localhost:18080/ > /dev/null 2>&1; then
                      echo "Baseline app is ready (attempt ${i})"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "ERROR: Baseline app did not become ready"
                  docker logs --tail 100 wsh-baseline-initial || true
                  exit 1

            - name: Generate VRT baseline snapshots from initial commit
              if: steps.baseline-snapshots.outputs.ready != 'true'
              working-directory: application/e2e
              env:
                  E2E_BASE_URL: http://localhost:18080
              run: pnpm exec playwright test --update-snapshots --workers=2 --retries=2

            - name: Upload init snapshots artifact
              if: steps.baseline-snapshots.outputs.ready != 'true'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.INIT_SNAPSHOTS_ARTIFACT }}
                  path: application/e2e/src/*-snapshots/**
                  retention-days: 30
                  if-no-files-found: error

            - name: Build current app
              working-directory: application
              env:
                  NODE_OPTIONS: "--max-old-space-size=4096"
              run: pnpm run build

            - name: Start current app
              working-directory: application
              env:
                  PORT: "28080"
                  NODE_ENV: "production"
              run: |
                  pnpm run start > /tmp/regulation-app.log 2>&1 &
                  echo "CURRENT_APP_PID=$!" >> $GITHUB_ENV

            - name: Wait for current app
              run: |
                  echo "Waiting for current app on http://localhost:28080 ..."
                  for i in $(seq 1 45); do
                    if curl --silent --fail --max-time 3 http://localhost:28080/ > /dev/null 2>&1; then
                      echo "Current app is ready (attempt ${i})"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "ERROR: Current app did not become ready"
                  tail -100 /tmp/regulation-app.log || true
                  exit 1

            - name: Run regulation VRT/E2E against current app
              working-directory: application/e2e
              env:
                  E2E_BASE_URL: http://localhost:28080
              run: pnpm exec playwright test --workers=2 --retries=2

            - name: Upload regulation debug artifacts
              if: failure()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: regulation-debug-${{ github.run_id }}-${{ github.run_attempt }}
                  path: |
                      /tmp/regulation-app.log
                      application/e2e/test-results
                  retention-days: 7
                  if-no-files-found: ignore

            - name: Cleanup baseline and current app
              if: always()
              run: |
                  if [ -n "${CURRENT_APP_PID}" ]; then
                    kill "${CURRENT_APP_PID}" 2>/dev/null || true
                  fi
                  docker rm -f wsh-baseline-initial >/dev/null 2>&1 || true
                  git worktree remove /tmp/wsh-initial --force || true
