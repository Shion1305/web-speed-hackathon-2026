name: Score

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]

env:
    # Number of scoring runs for stability (median/min/max reported)
    SCORE_RUNS: 3

jobs:
    score:
        name: Build & Score
        runs-on: ubuntu-24.04
        # 3 runs × ~20 min each + docker build + overhead
        timeout-minutes: 90

        permissions:
            contents: read
            issues: write
            pull-requests: write
            actions: read

        steps:
            # ------------------------------------------------------------------ #
            # 1. Checkout
            # ------------------------------------------------------------------ #
            - name: Checkout repository
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            # ------------------------------------------------------------------ #
            # 2. Set up Node.js (exact version from mise.toml)
            # ------------------------------------------------------------------ #
            - name: Set up Node.js 24.14.0
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: "24.14.0"

            # ------------------------------------------------------------------ #
            # 3. Set up pnpm (exact version matching packageManager field)
            # ------------------------------------------------------------------ #
            - name: Set up pnpm 10.32.1
              uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
              with:
                  version: "10.32.1"

            # ------------------------------------------------------------------ #
            # 4. Cache pnpm store for scoring-tool
            # ------------------------------------------------------------------ #
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache pnpm store
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
              with:
                  path: ${{ steps.pnpm-cache.outputs.store }}
                  key: pnpm-store-${{ runner.os }}-${{ hashFiles('scoring-tool/pnpm-lock.yaml') }}
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-

            # ------------------------------------------------------------------ #
            # 5. Build Docker image using Dockerfile (same as production)
            # ------------------------------------------------------------------ #
            - name: Build Docker image
              run: docker build -f Dockerfile -t wsh-app .

            # ------------------------------------------------------------------ #
            # 6. Start the application container
            #    Constraints match fly.toml: shared 1 CPU, 2 GB RAM
            # ------------------------------------------------------------------ #
            - name: Start application container
              run: |
                  docker run -d \
                    --name wsh-app \
                    --cpus=1 \
                    --memory=2g \
                    -p 8080:8080 \
                    -e PORT=8080 \
                    -e NODE_ENV=production \
                    wsh-app
                  echo "Container started"

            # ------------------------------------------------------------------ #
            # 7. Wait for the server to become ready
            # ------------------------------------------------------------------ #
            - name: Wait for application server to be ready
              run: |
                  echo "Waiting for server on http://localhost:8080 ..."
                  for i in $(seq 1 45); do
                    if curl --silent --fail --max-time 3 http://localhost:8080/ > /dev/null 2>&1; then
                      echo "Server is ready (attempt ${i})"
                      exit 0
                    fi
                    echo "  Attempt ${i}/45 - not ready yet, retrying in 2s ..."
                    sleep 2
                  done
                  echo "ERROR: Server did not become ready within 90 seconds"
                  echo "--- Last 50 lines of container log ---"
                  docker logs --tail 50 wsh-app || true
                  exit 1

            # ------------------------------------------------------------------ #
            # 8. Install scoring-tool dependencies
            # ------------------------------------------------------------------ #
            - name: Install scoring-tool dependencies
              working-directory: scoring-tool
              run: pnpm install --frozen-lockfile

            # ------------------------------------------------------------------ #
            # 9. Install Chrome stable for Playwright
            # ------------------------------------------------------------------ #
            - name: Install Chrome and Playwright system dependencies
              working-directory: scoring-tool
              run: npx playwright install chrome --with-deps

            # ------------------------------------------------------------------ #
            # 10. Run scoring tool N times for stability
            # ------------------------------------------------------------------ #
            - name: Run scoring tool (run 1 of ${{ env.SCORE_RUNS }})
              id: scoring_1
              working-directory: scoring-tool
              run: |
                  set -o pipefail
                  env -u GITHUB_ACTIONS pnpm start --applicationUrl http://localhost:8080 \
                    2>&1 | tee /tmp/score-1.txt || true

            - name: Run scoring tool (run 2 of ${{ env.SCORE_RUNS }})
              id: scoring_2
              working-directory: scoring-tool
              run: |
                  set -o pipefail
                  env -u GITHUB_ACTIONS pnpm start --applicationUrl http://localhost:8080 \
                    2>&1 | tee /tmp/score-2.txt || true

            - name: Run scoring tool (run 3 of ${{ env.SCORE_RUNS }})
              id: scoring_3
              working-directory: scoring-tool
              run: |
                  set -o pipefail
                  env -u GITHUB_ACTIONS pnpm start --applicationUrl http://localhost:8080 \
                    2>&1 | tee /tmp/score-3.txt || true

            # ------------------------------------------------------------------ #
            # 11. Download baseline scores from latest main branch run
            # ------------------------------------------------------------------ #
            - name: Download baseline scores artifact
              if: github.event_name == 'pull_request'
              uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295 # v9
              with:
                  name: score-baseline
                  branch: main
                  workflow: score.yml
                  path: /tmp/baseline
                  if_no_artifact_found: warn
              continue-on-error: true

            # ------------------------------------------------------------------ #
            # 12. Generate rich score comment
            # ------------------------------------------------------------------ #
            - name: Generate score comment
              if: always()
              run: |
                  # Collect run files that exist
                  RUN_FILES=""
                  for i in 1 2 3; do
                    if [ -s "/tmp/score-${i}.txt" ]; then
                      RUN_FILES="${RUN_FILES},/tmp/score-${i}.txt"
                    fi
                  done
                  RUN_FILES="${RUN_FILES#,}"  # trim leading comma

                  BASELINE_ARG=""
                  if [ -f "/tmp/baseline/scores.json" ]; then
                    BASELINE_ARG="--baseline /tmp/baseline/scores.json"
                  fi

                  node .github/scripts/generate-score-comment.mjs \
                    --runs "${RUN_FILES}" \
                    ${BASELINE_ARG} \
                    --commit "${{ github.sha }}" \
                    --output /tmp/comment.md \
                    --json-output /tmp/scores.json

            # ------------------------------------------------------------------ #
            # 13. Post score comment on PR / summary on push
            # ------------------------------------------------------------------ #
            - name: Post score results
              if: always()
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  COMMENT_MARKER="<!-- wsh-score-result -->"
                  COMMENT_BODY="$(cat /tmp/comment.md 2>/dev/null || echo 'Score output not available')"

                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    PR_NUMBER="${{ github.event.pull_request.number }}"
                    REPO="${{ github.repository }}"

                    EXISTING_COMMENT_ID=$(gh api \
                      "repos/${REPO}/issues/${PR_NUMBER}/comments" \
                      --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" \
                      2>/dev/null | head -1)

                    if [ -n "$EXISTING_COMMENT_ID" ]; then
                      echo "Updating existing score comment (id: ${EXISTING_COMMENT_ID})"
                      gh api \
                        --method PATCH \
                        "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
                        -f body="${COMMENT_BODY}"
                    else
                      echo "Creating new score comment on PR #${PR_NUMBER}"
                      gh pr comment "${PR_NUMBER}" \
                        --repo "${REPO}" \
                        --body "${COMMENT_BODY}"
                    fi

                  else
                    # Push to main: write to step summary
                    cat /tmp/comment.md >> $GITHUB_STEP_SUMMARY
                  fi

            # ------------------------------------------------------------------ #
            # 14. Save scores as baseline artifact (main branch only)
            # ------------------------------------------------------------------ #
            - name: Save baseline scores artifact
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: score-baseline
                  path: /tmp/scores.json
                  retention-days: 30
                  if-no-files-found: warn

            # ------------------------------------------------------------------ #
            # 15. Upload all raw score files as artifact (always, for debugging)
            # ------------------------------------------------------------------ #
            - name: Upload raw score logs
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: score-logs-${{ github.run_id }}-${{ github.run_attempt }}
                  path: |
                      /tmp/score-1.txt
                      /tmp/score-2.txt
                      /tmp/score-3.txt
                      /tmp/scores.json
                      /tmp/comment.md
                  retention-days: 14
                  if-no-files-found: ignore

            # ------------------------------------------------------------------ #
            # 16. Stop the application container
            # ------------------------------------------------------------------ #
            - name: Stop application container
              if: always()
              run: docker rm -f wsh-app >/dev/null 2>&1 || true
