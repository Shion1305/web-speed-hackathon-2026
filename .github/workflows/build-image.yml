name: Build and Push Docker Image

on:
    push:
        branches:
            - main

jobs:
    build:
        if: github.repository == 'Shion1305/web-speed-hackathon-2026'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.build
                  push: true
                  tags: ghcr.io/shion1305/web-speed-hackathon-2026:latest
