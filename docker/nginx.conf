worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  access_log /dev/stdout;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 8080;
    server_name _;
    root /app;

    add_header X-Content-Type-Options nosniff always;

    location = /api/v1/crok {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      gzip off;
    }

    location /api/ {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Serve image assets directly from storage without involving Node.
    location ~* ^/images/(.+)\.jpg$ {
      try_files /upload/images/$1.webp /public/images/$1.webp /upload/images/$1.jpg /public/images/$1.jpg =404;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
      try_files /upload$uri /public$uri =404;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/(movies|sounds)/ {
      try_files /upload$uri /public$uri =404;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/scripts/chunk-[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f].*\.js$ {
      try_files /dist$uri =404;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/(scripts|styles|assets|dicts|sprites|fonts)/ {
      try_files /dist$uri /public$uri =404;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    location = /index.html {
      try_files /dist/index.html =404;
      expires off;
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files /dist$uri /public$uri /upload$uri /index.html;
      expires off;
      add_header Cache-Control "no-cache";
    }
  }
}
