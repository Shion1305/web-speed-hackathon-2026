worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  access_log /dev/stdout;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;
  proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=image_cache:64m max_size=1024m inactive=30d use_temp_path=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  # Query string based image variant handling:
  # - no resize args -> ""
  # - square resize (w==h) -> "-w{size}"
  # - any other resize pattern -> "__fallback__" (force Node fallback)
  map "$arg_w:$arg_h" $image_variant_suffix {
    "~^:$" "";
    "~^(?<size>[1-9][0-9]*):\\k<size>$" "-w$size";
    default "__fallback__";
  }

  server {
    listen 8080;
    server_name _;
    root /app;

    add_header X-Content-Type-Options nosniff always;

    location = /api/v1/crok {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      gzip off;
    }

    location /api/ {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Serve image assets directly when possible.
    # If size variant is missing (or non-square resize query), fallback to Node and cache.
    location ~* ^/images/(?<image_name>.+)\.jpg$ {
      try_files /upload/images/$image_name$image_variant_suffix.webp /public/images/$image_name$image_variant_suffix.webp /upload/images/$image_name$image_variant_suffix.jpg /public/images/$image_name$image_variant_suffix.jpg @node_image;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/images/(?<image_name>.+)\.webp$ {
      try_files /upload/images/$image_name$image_variant_suffix.webp /public/images/$image_name$image_variant_suffix.webp @node_image;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
      try_files /upload$uri /public$uri @node_image;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location @node_image {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_cache image_cache;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_background_update on;
      proxy_cache_key "$scheme$request_method$host$uri$is_args$args|accept=$http_accept";
      proxy_cache_valid 200 30d;
      proxy_cache_valid 404 1m;
      proxy_ignore_headers Set-Cookie;
      proxy_hide_header Set-Cookie;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    location ~* ^/(movies|sounds)/ {
      try_files /upload$uri /public$uri =404;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/scripts/chunk-[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f].*\.js$ {
      try_files /dist$uri =404;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/(scripts|styles|assets|dicts|sprites|fonts)/ {
      try_files /dist$uri /public$uri =404;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    location = /index.html {
      try_files /dist/index.html =404;
      expires off;
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files /dist$uri /public$uri /upload$uri /index.html;
      expires off;
      add_header Cache-Control "no-cache";
    }
  }
}
